name: Autograding Tests
'on':
- push
- repository_dispatch
permissions:
  checks: write
  actions: read
  contents: read
jobs:
  run-autograding-tests:
    runs-on: ubuntu-latest
    if: github.actor != 'github-classroom[bot]'
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    - name: html validator
      id: html-validator
      uses: classroom-resources/autograding-command-grader@v1
      with:
        test-name: html validator
        setup-command: npm install
        command: npm exec html-validate "**/*.html"
        timeout: 60
        max-score: 10
    - name: Autograding Reporter
      uses: classroom-resources/autograding-grading-reporter@v1
      env:
        HTML-VALIDATOR_RESULTS: "${{steps.html-validator.outputs.result}}"
      with:
        runners: html-validator
